<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a1628; color: #e0e0e0; min-height: 100vh; }
  
  header { background: linear-gradient(135deg, #0a1628 0%, #0f2a1a 50%, #0a1628 100%); 
           border-bottom: 3px solid #2ecc71; padding: 40px 20px; text-align: center; }
  
  h1 { font-size: 3em; font-weight: 900; color: white; letter-spacing: 8px; margin-bottom: 10px; }
  .tagline { color: #a0c4a8; font-size: 1.1em; letter-spacing: 3px; margin-bottom: 30px; }
  .subtitle { color: #2ecc71; font-size: 0.9em; }
  
  main { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
  
  .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
  
  .tool-card { background: #0f1e30; border: 1px solid #1a3a2a; border-radius: 12px; padding: 24px;
               transition: all 0.3s; text-decoration: none; color: inherit; display: block; }
  .tool-card:hover { border-color: #2ecc71; transform: translateY(-4px); box-shadow: 0 8px 30px rgba(46,204,113,0.15); }
  
  .tool-number { color: #2ecc71; font-size: 0.8em; font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; }
  .tool-title { font-size: 1.1em; font-weight: 700; color: white; margin-bottom: 8px; }
  .tool-desc { color: #8a9a8a; font-size: 0.9em; line-height: 1.5; }
  
  .pill { display: inline-block; background: #1a3a2a; border: 1px solid #2ecc71; color: #2ecc71;
          font-size: 0.75em; padding: 3px 10px; border-radius: 20px; margin: 4px 2px; }
  .pill.gold { border-color: #f39c12; color: #f39c12; }
  
  .section-title { font-size: 1.4em; font-weight: 700; color: #2ecc71; margin: 40px 0 20px;
                   border-bottom: 1px solid #1a3a2a; padding-bottom: 10px; letter-spacing: 2px; }
  
  footer { text-align: center; padding: 40px 20px; color: #3a4a3a; border-top: 1px solid #1a3a2a; margin-top: 60px; }
  footer a { color: #2ecc71; text-decoration: none; }
