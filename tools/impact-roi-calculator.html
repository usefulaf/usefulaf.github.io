<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a2e; }
  .header { background: #1a1a2e; color: white; padding: 24px 32px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 13px; opacity: 0.7; margin-top: 4px; }
  .badge { display: inline-block; background: #00d4aa; color: #1a1a2e; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-left: 8px; vertical-align: middle; }
  .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media(max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card h2 { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: #1a1a2e; border-bottom: 2px solid #f0f0f0; padding-bottom: 12px; }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
  input, select, textarea { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; font-size: 14px; color: #1a1a2e; background: #fafafa; transition: border-color 0.2s; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #00d4aa; background: white; }
  .input-prefix { display: flex; align-items: center; }
  .prefix { background: #f0f0f0; border: 1.5px solid #e0e0e0; border-right: none; border-radius: 8px 0 0 8px; padding: 10px 12px; font-size: 14px; color: #666; font-weight: 600; }
  .input-prefix input { border-radius: 0 8px 8px 0; }
  .btn { background: #1a1a2e; color: white; border: none; border-radius: 8px; padding: 14px 28px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 8px; transition: background 0.2s; }
  .btn:hover { background: #2d2d4e; }
  .btn-green { background: #00d4aa; color: #1a1a2e; }
  .btn-green:hover { background: #00bfa5; }
  .results { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-top: 24px; display: none; }
  .results.show { display: block; }
  .results h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  @media(max-width: 600px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }
  .metric { background: #f8f9fa; border-radius: 10px; padding: 16px; text-align: center; border: 1.5px solid #e8e8e8; }
  .metric .val { font-size: 26px; font-weight: 800; color: #1a1a2e; }
  .metric .lbl { font-size: 11px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
  .metric.highlight { background: #1a1a2e; border-color: #1a1a2e; }
  .metric.highlight .val { color: #00d4aa; }
  .metric.highlight .lbl { color: rgba(255,255,255,0.6); }
  .metric.positive { background: #e8fff8; border-color: #00d4aa; }
  .metric.positive .val { color: #00a87a; }
  .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin: 20px 0 12px; }
  .bar-chart { margin-bottom: 24px; }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .bar-label { font-size: 13px; width: 130px; flex-shrink: 0; color: #555; }
  .bar-track { flex: 1; background: #f0f0f0; border-radius: 4px; height: 20px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; }
  .bar-fill span { font-size: 11px; font-weight: 700; color: white; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; background: #f8f9fa; font-weight: 700; color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
  td { padding: 10px 12px; border-top: 1px solid #f0f0f0; }
  .positive-text { color: #00a87a; font-weight: 700; }
  .negative-text { color: #e74c3c; font-weight: 700; }
  .prompt-box { background: #f0f8ff; border: 1.5px solid #b3d9ff; border-radius: 10px; padding: 18px; margin-top: 20px; }
  .prompt-box h3 { font-size: 13px; font-weight: 700; color: #0066cc; margin-bottom: 10px; }
  .prompt-box pre { font-size: 12px; line-height: 1.6; color: #333; white-space: pre-wrap; font-family: inherit; }
  .copy-btn { display: inline-block; background: #0066cc; color: white; border: none; border-radius: 6px; padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; }
  .copy-btn:hover { background: #0052a3; }
  .info { font-size: 12px; color: #888; margin-top: 6px; line-height: 1.5; }
  .tag { display: inline-block; background: #f0f0f0; border-radius: 20px; padding: 3px 10px; font-size: 11px; color: #666; margin: 2px; }
</style>
