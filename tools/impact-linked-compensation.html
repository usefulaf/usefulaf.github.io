    <title>Impact-Linked Compensation Designer | Useful AF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-navy: #1a2730;
            --impact-green: #2d7d46;
            --gold-accent: #b8860b;
            --light-bg: #f5f5f5;
            --border-gray: #d0d0d0;
            --text-dark: #333;
            --text-light: #666;
            --success-green: #27ae60;
            --warning-orange: #e67e22;
            --error-red: #e74c3c;

        body {

            background: #f9f9f9;
